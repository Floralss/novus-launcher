<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Вход — Black Roleplay</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body class="logged-out">
<nav class="navbar" id="main-nav"></nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span class="nl">BLACK</span><span class="ng">ROLEPLAY</span></div>
    <h2>ВХОД В АККАУНТ</h2>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="email" placeholder="ваш@email.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label>Пароль</label>
      <input type="password" id="pass" placeholder="Пароль" autocomplete="current-password"/>
    </div>
    <div class="form-err" id="err"></div>
    <button class="btn-form" id="btn-login" onclick="doLogin()">ВОЙТИ</button>
    <div class="form-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/nav.js"></script>
<script>
  renderNav('');
  // Если уже залогинен — редирект
  auth.onAuthStateChanged(u => { if (u) window.location.href = 'index.html'; });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const err   = document.getElementById('err');
    const btn   = document.getElementById('btn-login');
    err.textContent = '';
    if (!email || !pass) { err.textContent = 'Заполните все поля'; return; }
    btn.disabled = true; btn.textContent = 'ВХОД...';
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      window.location.href = 'index.html';
    } catch(e) {
      err.textContent = translateErr(e.code);
      btn.disabled = false; btn.textContent = 'ВОЙТИ';
    }
  }

  function translateErr(c) {
    return ({
      'auth/user-not-found':'Пользователь не найден',
      'auth/wrong-password':'Неверный пароль',
      'auth/invalid-email':'Неверный email',
      'auth/invalid-credential':'Неверный email или пароль',
      'auth/too-many-requests':'Слишком много попыток, подождите',
      'auth/network-request-failed':'Нет интернета'
    })[c] || 'Ошибка входа, попробуйте снова';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
