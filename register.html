<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Регистрация — Black Roleplay</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body class="logged-out">
<nav class="navbar" id="main-nav"></nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><span class="nl">BLACK</span><span class="ng">ROLEPLAY</span></div>
    <h2>РЕГИСТРАЦИЯ</h2>
    <div class="fg">
      <label>Никнейм (для игры)</label>
      <input type="text" id="nick" placeholder="Минимум 3 символа" maxlength="20"/>
    </div>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="email" placeholder="ваш@email.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label>Пароль</label>
      <input type="password" id="pass" placeholder="Минимум 6 символов"/>
    </div>
    <div class="fg">
      <label>Повтор пароля</label>
      <input type="password" id="pass2" placeholder="Повторите пароль"/>
    </div>
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:12px;line-height:1.5;">
      Регистрируясь, вы соглашаетесь с <a href="rules.html" style="color:var(--gold)">правилами сервера</a>.
    </div>
    <div class="form-err" id="err"></div>
    <button class="btn-form" id="btn-reg" onclick="doRegister()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    <div class="form-link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/nav.js"></script>
<script>
  renderNav('');
  auth.onAuthStateChanged(u => { if (u) window.location.href = 'profile.html'; });

  async function doRegister() {
    const nick  = document.getElementById('nick').value.trim();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const pass2 = document.getElementById('pass2').value;
    const err   = document.getElementById('err');
    const btn   = document.getElementById('btn-reg');
    err.textContent = '';

    if (!nick || !email || !pass || !pass2) { err.textContent = 'Заполните все поля'; return; }
    if (nick.length < 3)  { err.textContent = 'Никнейм минимум 3 символа'; return; }
    if (nick.length > 20) { err.textContent = 'Никнейм максимум 20 символов'; return; }
    if (!/^[a-zA-Z0-9_]+$/.test(nick)) { err.textContent = 'Никнейм: только буквы, цифры и _'; return; }
    if (pass.length < 6)  { err.textContent = 'Пароль минимум 6 символов'; return; }
    if (pass !== pass2)   { err.textContent = 'Пароли не совпадают'; return; }

    btn.disabled = true; btn.textContent = 'РЕГИСТРАЦИЯ...';

    try {
      // Проверяем уникальность ника
      const nickSnap = await db.collection('users').where('nickname', '==', nick).limit(1).get();
      if (!nickSnap.empty) {
        err.textContent = 'Этот никнейм уже занят';
        btn.disabled = false; btn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
        return;
      }

      // Создаём аккаунт Firebase Auth
      const cred = await auth.createUserWithEmailAndPassword(email, pass);

      // Сохраняем профиль в Firestore
      await db.collection('users').doc(cred.user.uid).set({
        nickname:   nick,
        email:      email,
        level:      0,
        money:      1500,
        blcoins:    2,
        fraction:   'Безработный',
        rank:       0,
        registered: firebase.firestore.FieldValue.serverTimestamp(),
        lastSeen:   firebase.firestore.FieldValue.serverTimestamp(),
        ban:        false,
        posts:      0,
      });

      window.location.href = 'profile.html';
    } catch(e) {
      btn.disabled = false; btn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
      if (e.code === 'auth/email-already-in-use')
        err.innerHTML = 'Email занят. <a href="login.html" style="color:var(--gold)">Войти?</a>';
      else
        err.textContent = translateErr(e.code);
    }
  }

  function translateErr(c) {
    return ({
      'auth/email-already-in-use':'Email уже занят',
      'auth/invalid-email':'Неверный формат email',
      'auth/weak-password':'Пароль слишком простой',
      'auth/network-request-failed':'Нет интернета'
    })[c] || 'Ошибка: ' + c;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
