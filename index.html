<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Профиль — Black Roleplay</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body class="logged-out">
<nav class="navbar" id="main-nav"></nav>

<div class="container" style="padding-top:96px;">
  <div class="page-hdr" style="padding-top:0;text-align:left;border:none;margin-bottom:20px;">
    <h1 id="profile-title">МОЙ ПРОФИЛЬ</h1>
  </div>

  <div class="profile-wrap">
    <!-- Шапка профиля -->
    <div class="profile-header" id="profile-header">
      <div class="profile-ava-big" id="p-ava">?</div>
      <div class="profile-info">
        <div class="profile-nick" id="p-nick">Загрузка...</div>
        <div class="profile-meta" id="p-meta">Регистрация: —</div>
        <div class="profile-meta" id="p-fraction" style="color:var(--gold);margin-top:4px;">Безработный</div>
      </div>
    </div>

    <!-- Статистика -->
    <div class="profile-stats">
      <div class="p-stat"><div class="p-stat-n" id="p-level">0</div><div class="p-stat-l">УРОВЕНЬ</div></div>
      <div class="p-stat"><div class="p-stat-n" id="p-money">$0</div><div class="p-stat-l">ДЕНЬГИ</div></div>
      <div class="p-stat"><div class="p-stat-n" id="p-blcoins">0</div><div class="p-stat-l">BLCOIN</div></div>
      <div class="p-stat"><div class="p-stat-n" id="p-posts">0</div><div class="p-stat-l">ПОСТОВ</div></div>
    </div>

    <!-- Мои темы на форуме -->
    <div class="cat-block">
      <div class="cat-hdr">
        <span class="cat-ic">💬</span>
        <div><div class="cat-title-txt">МОИ ТЕМЫ НА ФОРУМЕ</div></div>
      </div>
      <div id="my-topics"><div style="padding:18px 20px;color:var(--muted);font-size:.85rem;">Загрузка...</div></div>
    </div>

    <!-- Кнопка выйти -->
    <div style="margin-top:20px;">
      <button class="btn-form" style="width:auto;padding:10px 28px;background:transparent;border:1px solid var(--red);color:var(--red);" onclick="logout()">🚪 Выйти из аккаунта</button>
    </div>
  </div>
</div>

<footer class="footer" id="main-footer"></footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/nav.js"></script>
<script src="js/footer.js"></script>
<script>
  renderNav(''); renderFooter();

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'login.html'; return; }

    const doc = await db.collection('users').doc(user.uid).get();
    if (!doc.exists) { window.location.href = 'login.html'; return; }
    const d = doc.data();

    document.getElementById('p-ava').textContent = d.nickname[0].toUpperCase();
    document.getElementById('p-nick').textContent = d.nickname;
    document.getElementById('p-fraction').textContent = d.fraction || 'Безработный';
    document.getElementById('p-level').textContent = d.level || 0;
    document.getElementById('p-money').textContent = '$' + (d.money || 0).toLocaleString();
    document.getElementById('p-blcoins').textContent = d.blcoins || 0;
    document.getElementById('p-posts').textContent = d.posts || 0;

    const reg = d.registered ? new Date(d.registered.seconds*1000).toLocaleDateString('ru') : '—';
    document.getElementById('p-meta').textContent = 'Регистрация: ' + reg + ' | Email: ' + user.email;

    // Загружаем темы игрока
    const topics = await db.collection('forum_topics')
      .where('authorId','==', user.uid).orderBy('createdAt','desc').limit(5).get();
    const topicsEl = document.getElementById('my-topics');
    if (topics.empty) {
      topicsEl.innerHTML = '<div style="padding:14px 20px;color:var(--muted);font-size:.85rem;">Вы ещё не создавали тем.</div>';
    } else {
      topicsEl.innerHTML = '';
      topics.forEach(t => {
        const td = t.data();
        const d2 = new Date(td.createdAt?.seconds*1000).toLocaleDateString('ru');
        topicsEl.innerHTML += `
          <div class="topic-row" onclick="location.href='topic.html?id=${t.id}'">
            <div class="t-ava">💬</div>
            <div class="t-body">
              <div class="t-name">${td.title}</div>
              <div class="t-by">${td.category} · ${d2}</div>
            </div>
            <div class="t-stats"><strong>${td.replies||0}</strong>ответов</div>
          </div>`;
      });
    }
  });
</script>
</body>
</html>
